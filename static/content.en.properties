bio.title=Biography
bio.text=I am DJ Gera Suppo and my approach is based on creating sophisticated atmospheres where music and the environment merge naturally. In every set I seek a real connection with the audience, building a carefully crafted sonic journey that evolves progressively. My musical line moves between Deep House, Afro House, Nu Disco and melodic House, combining organic grooves, selected vocals and elegant textures. I focus on developing sets with identity, where each transition has a purpose and every moment contributes to the overall experience. I incorporate my own productions and exclusive edits, which allows me to add a personal stamp and differentiate every performance. I am especially focused on tardeos, sunset sessions, beach clubs and rooftops, creating warm, close atmospheres with enveloping energy that accompanies the moment and elevates the audience experience. ✨ Concept · Sonic elegance · Progressive energy · Connection with the environment
