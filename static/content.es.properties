bio.text=Hola, soy Gera Suppo, DJ y productor argentino {arg_flag} residente en Mallorca, España. Mi propuesta combina técnica, selección musical y lectura de pista para construir sets con identidad, donde cada transición tiene un propósito y cada momento suma a la experiencia global. Integro producciones propias y edits exclusivos para aportar un sello personal en cada actuación. Estoy especialmente enfocado en tardeos, sunset sessions, beach clubs y rooftops, creando ambientes cálidos, cercanos y de energía envolvente que evoluciona de forma progresiva.
