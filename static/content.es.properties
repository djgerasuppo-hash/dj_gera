bio.title=Biografía
bio.text=Soy DJ Gera Suppo y mi propuesta se basa en crear atmósferas sofisticadas donde la música y el entorno se fusionan de forma natural. En cada sesión busco generar una conexión real con el público, construyendo un viaje sonoro cuidado al detalle que evoluciona de manera progresiva. Mi línea musical se mueve entre Deep House, Afro House, Nu Disco y House melódico, combinando grooves orgánicos, vocales seleccionadas y texturas elegantes. Me enfoco en desarrollar sets con identidad, donde cada transición tiene un propósito y cada momento aporta a la experiencia global. Incorporo producciones propias y edits exclusivos, lo que me permite aportar un sello personal y diferenciar cada actuación. Estoy especialmente enfocado en tardeos, sunset sessions, beach clubs y rooftops, creando ambientes cálidos, cercanos y de una energía envolvente que hace vibrar progresivamente.
